name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      E2E_DASHBOARD_EMAIL: ${{ secrets.E2E_DASHBOARD_EMAIL }}
      E2E_DASHBOARD_PASSWORD: ${{ secrets.E2E_DASHBOARD_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck -w frontend

      - name: Lint (strict – zero warnings)
        run: npm run lint:strict -w frontend

      - name: Tests
        run: npm run test:coverage -w frontend

      - name: Fix coverage paths for SonarCloud
        run: sed -i 's/SF:/SF:frontend\//g' frontend/coverage/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 1

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./frontend/coverage
          fail_ci_if_error: false

      - name: Build
        run: npm run build -w frontend

      - name: Check frontend bundle budget
        run: npm run audit:bundle

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run public E2E tests
        working-directory: frontend
        run: npx playwright test --project=public

      - name: Run authenticated E2E tests
        if: env.E2E_DASHBOARD_EMAIL != '' && env.E2E_DASHBOARD_PASSWORD != ''
        working-directory: frontend
        run: npx playwright test --project=chromium

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test
    # SonarCloud Automatic Analysis must be disabled so this scan can apply
    # sonar-project.properties and import the generated LCOV coverage report.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    continue-on-error: true
    steps:
      - name: Checkout repository
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@c9d327c0246c0bbfe955144aa8a5e033bf766f52 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
