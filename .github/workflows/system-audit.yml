name: System Audit

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ai-backend-smoke:
    name: AI backend smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-backend/requirements.txt

      - name: Install AI backend dependencies
        run: python -m pip install --upgrade pip && pip install -r ai-backend/requirements.txt

      - name: Run AI backend smoke tests
        run: node scripts/system-audit.mjs --skip-frontend --skip-supabase

  supabase-audit:
    name: Supabase audit files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test migration history guard
        run: npm run test:migrations

      - name: Check migration history
        env:
          MIGRATION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: npm run audit:migrations -- --base "$MIGRATION_BASE"

      - name: Validate Supabase audit assets
        run: node scripts/system-audit.mjs --skip-frontend --skip-backend
